name: Rehearse publish (TestPyPI)

# Manual-only dress rehearsal of the release. Builds the package and uploads it to
# TestPyPI (a throwaway sandbox), so the publish mechanism and the rendered page can
# be checked before the real release. Each run gets a unique dev version so the
# rehearsal can be repeated without hitting TestPyPI's "version already exists" rule.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  testpypi:
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write  # Trusted Publishing (OIDC), no token needed
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Give this rehearsal a unique dev version
        run: |
          sed -i "s/^version = \"\(.*\)\"/version = \"\1.dev${{ github.run_number }}\"/" pyproject.toml
          grep "^version" pyproject.toml

      - name: Build and check
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
