name: Build documentation

on:
  # The Sphinx docs site is built starting from the documentation story. Until a
  # docs/ source tree exists, this workflow is manual-only (workflow_dispatch),
  # so it does not fail on missing docs. Restore the push/pull_request triggers
  # on [main] once docs/ is added.
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build docs
        run: sphinx-build -b html -W docs docs/_build/html